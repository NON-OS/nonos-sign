name: ci

# Production gate for nonos-sign. The host ML-DSA-65 build links the kernel's
# vendored pqclean tree, so CI fetches just that path before building. Then
# formatting, lints, build, and the self-contained fixture tests.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Fetch pqclean from the kernel tree
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/NON-OS/nonos-micro-kernel.git "$tmp"
          git -C "$tmp" sparse-checkout set third_party/pqclean
          mkdir -p "${GITHUB_WORKSPACE}/../third_party"
          cp -r "$tmp/third_party/pqclean" "${GITHUB_WORKSPACE}/../third_party/pqclean"
      - name: Toolchain components
        run: rustup component add clippy rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        run: cargo build --all-targets --locked
      - name: tests (self-contained fixtures)
        run: cargo test --lib --test host_trust --test valid_chain --locked
